<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Dinonaktifkan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 450px;
            width: 100%;
            border-top: 5px solid #e74c3c;
        }

        .icon {
            width: 70px;
            height: 70px;
            background-color: #fde8e8;
            color: #e74c3c;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 20px auto;
        }

        h1 {
            font-size: 22px;
            color: #2c3e50;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        p {
            font-size: 14px;
            color: #7f8c8d;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .badge {
            display: inline-block;
            background-color: #f2f4f7;
            color: #555;
            padding: 6px 14px;
            font-size: 12px;
            border-radius: 20px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">
            &#9888;
        </div>
        <h1>Maaf, Website Ini Telah Dinonaktifkan oleh Admin</h1>
        <p>Akses ke situs web ini sedang ditutup sementara atau permanen. Jika Anda merasa ini adalah kesalahan, silakan hubungi tim administrator terkait.</p>
        <div class="badge">Status: Nonaktif</div>
    </div>

</body>
</html>
