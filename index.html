<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANDAVGK HUB</title>
    
    <link rel="icon" type="image/png" href="https://i.ibb.co.com/dsGJwRFz/image.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* --- RESET & ROOT STYLE --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 4px;
            color: #000000;
            text-transform: uppercase;
        }

        /* --- MAIN CONTAINER --- */
        main {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 3.5rem;
        }

        /* --- GRID BANNER (YT THUMBNAIL STYLE) --- */
        .banner-container {
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .grid-banner {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #f3f4f6;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #e5e7eb;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            transition: transform 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
            cursor: pointer;
        }

        /* Background image container untuk ganti gambar smooth */
        .banner-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.8;
            transition: background-image 0.6s ease-in-out, transform 0.6s ease;
        }

        /* Hover Effect pada Banner */
        .grid-banner:hover {
            transform: translateY(-5px);
            border-color: #000000;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
        }

        .grid-banner:hover .banner-bg {
            transform: scale(1.03);
            opacity: 0.9;
        }

        /* Text Kiri Bawah (Welcome Bro) */
        .banner-text {
            position: absolute;
            bottom: 24px;
            left: 24px;
            z-index: 2;
            font-size: 2rem;
            font-weight: 800;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            letter-spacing: 1px;
        }

        .banner-text span {
            color: #ffffff;
        }

        /* --- INDIKATOR TITIK BULAT (DI TENGAH BAWAH GRID) --- */
        .banner-dots {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 3;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .dot.active {
            background-color: #ffffff;
            width: 20px; /* Efek memanjang sedikit ketika aktif agar keren */
            border-radius: 4px;
        }

        /* --- SECTION DIVIDER (ALL VGK) --- */
        .divider-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        .line {
            flex: 1;
            height: 2px;
            background: linear-gradient(90deg, transparent, #000000, transparent);
        }

        .divider-text {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 6px;
            color: #000000;
            text-transform: uppercase;
        }

        /* --- SECTION FORM / TABEL INPUT --- */
        .code-section {
            background: #ffffff;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
            animation: fadeInUp 0.8s ease-out 0.6s both;
        }

        .section-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #4b5563;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        /* Input Container & Field */
        .input-group {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-field {
            width: 100%;
            padding: 1rem 1.2rem;
            background: #ffffff;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            color: #000000;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-field:focus {
            border-color: #000000;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
        }

        /* Submit Button */
        .btn-submit {
            margin-top: 8px;
            padding: 1rem;
            background: #000000;
            border: none;
            border-radius: 10px;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            background: #1f2937;
            transform: translateY(-2px);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        /* --- DYNAMIC ALERTS (UI RAPI MINIMALIS) --- */
        .alert-box {
            margin-top: 1rem;
            padding: 1rem 1.2rem;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transform: scale(0.95);
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .alert-box.show {
            transform: scale(1);
            opacity: 1;
            max-height: 80px;
            margin-top: 1.5rem;
        }

        .alert-error {
            background: #fef2f2;
            border: 2px solid #ef4444;
            color: #991b1b;
        }

        .alert-success {
            background: #f0fdf4;
            border: 2px solid #22c55e;
            color: #166534;
        }

        /* --- KEYFRAMES ANIMASI --- */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <h1>PANDAVGK</h1>
    </header>

    <main>
        <section class="banner-container">
            <div class="grid-banner">
                <div id="bannerBg" class="banner-bg"></div>
                
                <div class="banner-text">WELCOME <span>BRO</span></div>
                
                <div class="banner-dots">
                    <div class="dot active"></div>
                    <div class="dot"></div>
                </div>
            </div>
        </section>

        <section class="divider-container">
            <div class="line"></div>
            <div class="divider-text">ALL VGK</div>
            <div class="line"></div>
        </section>

        <section class="code-section">
            <div class="section-title">Your Code</div>
            <div class="input-group">
                <input type="text" id="codeInput" class="input-field" placeholder="Masukkan kode rahasia di sini...">
                <button type="button" class="btn-submit" onclick="validateCode()">Verifikasi Kode</button>
            </div>
            
            <div id="alertBox" class="alert-box"></div>
        </section>
    </main>

    <script>
        // Array berisi kedua link gambar dari kamu
        const images = [
            "https://i.ibb.co.com/RGffnRm3/Gemini-Generated-Image-xa2hf1xa2hf1xa2h.png",
            "https://i.ibb.co.com/Y7b5zjgg/Gemini-Generated-Image-ny4ceny4ceny4cen.png"
        ];
        
        let currentImgIndex = 0;
        const bannerBg = document.getElementById('bannerBg');
        const dots = document.querySelectorAll('.dot');

        // Set gambar pertama saat load awal
        bannerBg.style.backgroundImage = `url('${images[currentImgIndex]}')`;

        // Fungsi berganti gambar otomatis
        function changeImage() {
            // Hapus status aktif dari titik bulat saat ini
            dots[currentImgIndex].classList.remove('active');
            
            // Pindah ke index berikutnya
            currentImgIndex = (currentImgIndex + 1) % images.length;
            
            // Ganti background gambar & aktifkan titik bulat baru
            bannerBg.style.backgroundImage = `url('${images[currentImgIndex]}')`;
            dots[currentImgIndex].classList.add('active');
        }

        // Jalankan pergantian gambar setiap 3 detik (3000ms)
        setInterval(changeImage, 3000);

        // Kunci kode rahasia
        const CORRECT_CODE = "VGK-VID01"; 

        function validateCode() {
            const inputVal = document.getElementById('codeInput').value.trim();
            const alertBox = document.getElementById('alertBox');
            
            alertBox.className = "alert-box";

            if (inputVal === "") {
                alertBox.classList.add('alert-error', 'show');
                alertBox.innerHTML = `⚠️ Kode belum dimasukkan! Jangan dikosongin dong bro.`;
            } 
            else if (inputVal !== CORRECT_CODE) {
                alertBox.classList.add('alert-error', 'show');
                alertBox.innerHTML = `❌ Waduh salah! "${inputVal}" bukan kode yang bener, coba cek lagi!`;
            } 
            else {
                alertBox.classList.add('alert-success', 'show');
                alertBox.innerHTML = `🔥 MANTAP! Kode cocok, mengalihkan halaman...`;
                
                setTimeout(function() {
                    window.location.href = "https://www.youtube.com"; // Ganti dengan link tujuanmu
                }, 800);
            }
        }
    </script>
</body>
</html>
